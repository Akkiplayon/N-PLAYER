<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NPlayer</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════════
     LAYER 1 · INTRO SCREEN (z-index: 950)
     Shown only when a file is first loaded — NOT on app startup.
     ════════════════════════════════════════════════════════════════════════ -->
<div id="intro-screen">
  <video id="intro-video" src="assets/intro.mp4" muted playsinline preload="auto"></video>
  <button id="intro-skip">Skip Intro ›</button>
</div>

<!-- ════════════════════════════════════════════════════════════════════════
     LAYER 2 · HOME SCREEN (z-index: 800)
     ════════════════════════════════════════════════════════════════════════ -->
<div id="home-screen">
  <!-- Window controls -->
  <div id="home-titlebar">
    <div class="tb-btn" id="home-btn-min" title="Minimize">
      <svg viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1"/></svg>
    </div>
    <div class="tb-btn" id="home-btn-max" title="Maximize">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1">
        <rect x=".5" y=".5" width="9" height="9"/>
      </svg>
    </div>
    <div class="tb-btn close" id="home-btn-close" title="Close">
      <svg viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.4">
        <line x1="0" y1="0" x2="10" y2="10"/>
        <line x1="10" y1="0" x2="0" y2="10"/>
      </svg>
    </div>
  </div>

  <!-- Cinematic background -->
  <div id="home-bg">
    <img id="home-bg-image" src="assets/home-bg.jpg" alt=""
         onerror="this.style.display='none'"/>
  </div>

  <!-- Centre content -->
  <div id="home-content">
    <div class="home-logo">NPLAYER</div>
    <div class="home-tagline">Your cinema, your rules</div>

    <button id="import-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0
                 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
      </svg>
      Import Video
    </button>

    <div class="home-hint">Supports MP4 · MKV · AVI · MOV · WebM · and more</div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════════
     LAYER 3 · PLAYER SCREEN (z-index: 700)
     ════════════════════════════════════════════════════════════════════════ -->
<div id="player-screen">

  <!-- Frameless title bar -->
  <div id="titlebar">
    <div class="tb-btn" id="btn-min" title="Minimize">
      <svg viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1"/></svg>
    </div>
    <div class="tb-btn" id="btn-max" title="Maximize / Restore">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1">
        <rect x=".5" y=".5" width="9" height="9"/>
      </svg>
    </div>
    <div class="tb-btn close" id="btn-close" title="Close">
      <svg viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.4">
        <line x1="0" y1="0" x2="10" y2="10"/>
        <line x1="10" y1="0" x2="0" y2="10"/>
      </svg>
    </div>
  </div>

  <!-- ── "Stream Something New" top-right button ──────────────────────── -->
  <!-- Visible only once a video is loaded (display toggled via JS) -->
  <button id="btn-stream-new" title="Stream Something New">
    <svg width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
    </svg>
    Stream Something New
  </button>

  <!-- ── Video ──────────────────────────────────────────────────────────── -->
  <div id="video-layer">
    <video id="main-video" preload="auto"></video>
    <div id="click-ripple"></div>
  </div>

  <!-- ── Controls ──────────────────────────────────────────────────────── -->
  <div id="controls-layer">

    <!-- Scrub thumbnail (positioned by JS) -->
    <div id="scrub-thumb">
      <canvas id="scrub-canvas" width="320" height="180"></canvas>
      <div id="scrub-time-label">0:00</div>
    </div>

    <!-- Progress section — tall padding = large thumbnail hit-area -->
    <div id="progress-section">
      <div id="progress-wrap">
        <div id="progress-bg"></div>
        <div id="progress-buffer"></div>
        <div id="progress-fill"></div>
        <div id="progress-thumb"></div>
      </div>
    </div>

    <!-- Bottom control row -->
    <div id="ctrl-row">

      <!-- Play/Pause -->
      <button class="ctrl-btn" id="btn-play" title="Play / Pause (Space)">
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="white">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none">
          <rect x="5"  y="3" width="4" height="18" rx="1"/>
          <rect x="15" y="3" width="4" height="18" rx="1"/>
        </svg>
      </button>

      <!-- Skip back 10s -->
      <button class="ctrl-btn" id="btn-back" title="Rewind 10s (←)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          <text x="8.5" y="15" font-size="5.5" font-family="DM Sans,Arial"
                font-weight="700" fill="white" stroke="none" text-anchor="middle">10</text>
        </svg>
      </button>

      <!-- Skip forward 10s -->
      <button class="ctrl-btn" id="btn-fwd" title="Forward 10s (→)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          <text x="15.5" y="15" font-size="5.5" font-family="DM Sans,Arial"
                font-weight="700" fill="white" stroke="none" text-anchor="middle">10</text>
        </svg>
      </button>

      <!-- Volume -->
      <div id="vol-group">
        <button class="ctrl-btn" id="btn-mute" title="Mute (M)">
          <svg id="icon-vol" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="white" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          <svg id="icon-muted" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="white" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9"  x2="17" y2="15"/>
            <line x1="17" y1="9"  x2="23" y2="15"/>
          </svg>
        </button>
        <div id="vol-slider-wrap">
          <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1"/>
        </div>
      </div>

      <!-- Time display -->
      <span id="time-display">0:00 / 0:00</span>

      <div class="spacer"></div>

      <!-- Video title -->
      <span id="title-display"></span>

      <!-- Audio & Subtitles -->
      <button class="ctrl-btn" id="btn-as" title="Audio &amp; Subtitles">
        <svg width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14 a2 2 0 0 1 2 2z"/>
          <line x1="9"  y1="10" x2="9"  y2="10"/>
          <line x1="12" y1="10" x2="12" y2="10"/>
          <line x1="15" y1="10" x2="15" y2="10"/>
        </svg>
      </button>

      <!-- Open file -->
      <button class="ctrl-btn" id="btn-open" title="Open File (O)">
        <svg width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5 a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </button>

      <!-- Fullscreen -->
      <button class="ctrl-btn" id="btn-fs" title="Fullscreen (F)">
        <svg id="icon-fs" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3"  x2="14" y2="10"/>
          <line x1="3"  y1="21" x2="10" y2="14"/>
        </svg>
        <svg id="icon-exit-fs" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"
             style="display:none">
          <polyline points="4 14 10 14 10 20"/>
          <polyline points="20 10 14 10 14 4"/>
          <line x1="10" y1="14" x2="3"  y2="21"/>
          <line x1="21" y1="3"  x2="14" y2="10"/>
        </svg>
      </button>

    </div><!-- /ctrl-row -->
  </div><!-- /controls-layer -->

  <!-- ── Audio & Subtitles Panel ─────────────────────────────────────────── -->
  <div id="as-panel" role="dialog" aria-label="Audio and Subtitles">
    <div class="as-section-title">Audio</div>
    <ul class="as-track-list" id="audio-track-list">
      <li class="as-empty">No additional tracks detected</li>
    </ul>

    <div class="as-divider"></div>

    <div class="as-section-title">Subtitles</div>
    <ul class="as-track-list" id="subtitle-track-list">
      <li class="as-empty">No subtitle tracks detected</li>
    </ul>

    <!-- Caption Settings section is injected here by AudioSubtitlesPanel JS -->
  </div>

</div><!-- /player-screen -->

<script src="renderer.js"></script>
</body>
</html>
